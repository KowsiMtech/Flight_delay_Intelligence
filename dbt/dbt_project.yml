name: 'flight_delay_intelligence'
version: '1.0.0'
config-version: 2

profile: 'flight_delay_intelligence'

model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]
target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  flight_delay_intelligence:
    staging:
      +materialized: view          # staging = views, no storage cost
      +schema: silver
    dimensions:
      +materialized: table         # dims = full tables, slowly changing
      +schema: gold
    facts:
      +materialized: incremental   # facts = incremental, append new rows only
      +schema: gold
      +unique_key: flight_id
    marts:
      +materialized: table         # marts = aggregated, rebuilt daily
      +schema: gold
